blueprint:
  name: "🌱 Bodenfeuchte Alarm System"
  description: |
    # 🌱 Bodenfeuchte Alarm System
    **Version 5.0**

    Intelligente Pflanzenüberwachung – flexibel, zonenbasiert und vollständig konfigurierbar.

    Überwacht einen Bodenfeuchte-Sensor (numerisch). Bei Unterschreiten eines Grenzwerts wird (optional wiederholt) per Alexa, Anhaltende Benachrichtigung und/oder Mobile App benachrichtigt.

    Optional kann eine „Feuchtigkeit wieder OK“-Info gesendet werden.

    Neu: Alexa Lautstärke kann temporär gesetzt und danach automatisch wiederhergestellt werden.

    **Autor x1marc**
  domain: automation

  input:

    moisture_sensor:
      name: Bodenfeuchte-Sensor
      selector:
        entity:
          domain: sensor

    threshold_low:
      name: Grenzwert (zu trocken)
      default: 50
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"

    hysteresis:
      name: Hysterese
      default: 3
      selector:
        number:
          min: 0
          max: 20
          step: 1
          unit_of_measurement: "%"

    below_for:
      name: Trocken-Verzögerung
      default:
        minutes: 5
      selector:
        duration:

    ok_for:
      name: OK-Verzögerung
      default:
        minutes: 2
      selector:
        duration:

    repeat_mode:
      name: Wiederholmodus
      default: repeat
      selector:
        select:
          options:
            - label: "Nur einmal"
              value: once
            - label: "Wiederholen"
              value: repeat

    repeat_interval:
      name: Wiederholintervall
      default: 30
      selector:
        number:
          min: 5
          max: 180
          step: 5
          unit_of_measurement: "min"

    cooldown_minutes:
      name: Cooldown (nur Trocken)
      default: 30
      selector:
        number:
          min: 0
          max: 360
          step: 5
          unit_of_measurement: "min"

    # Alexa
    alexa_enabled:
      name: Alexa aktiv?
      default: true
      selector:
        boolean:

    alexa_targets:
      name: Alexa Geräte
      selector:
        entity:
          domain: media_player
          multiple: true

    alexa_volume_temp_enabled:
      name: Alexa Lautstärke temporär setzen?
      default: false
      selector:
        boolean:

    alexa_volume_level:
      name: Alexa Lautstärke (0.0–1.0)
      default: 0.35
      selector:
        number:
          min: 0.0
          max: 1.0
          step: 0.05

    alexa_volume_restore_delay:
      name: Restore Verzögerung (Sekunden)
      default: 2
      selector:
        number:
          min: 0
          max: 30
          step: 1
          unit_of_measurement: "s"

mode: single

variables:
  sensor: !input moisture_sensor
  thr: !input threshold_low
  hyst: !input hysteresis
  thr_ok: "{{ thr | float + hyst | float }}"
  cooldown_minutes: !input cooldown_minutes

  alexa_enabled: !input alexa_enabled
  alexa_targets: !input alexa_targets
  alexa_volume_temp_enabled: !input alexa_volume_temp_enabled
  alexa_volume_level: !input alexa_volume_level
  alexa_volume_restore_delay: !input alexa_volume_restore_delay

trigger:
  - platform: template
    id: dry
    value_template: "{{ states(sensor) | float(999) < thr }}"
    for: !input below_for

  - platform: template
    id: ok
    value_template: "{{ states(sensor) | float(0) >= thr_ok }}"
    for: !input ok_for

condition: []

action:
  - choose:

      # TROCKEN
      - conditions:
          - condition: trigger
            id: dry
        sequence:
          - repeat:
              for_each: "{{ alexa_targets }}"
              sequence:
                - variables:
                    _player: "{{ repeat.item }}"
                    _prev_vol: "{{ state_attr(_player, 'volume_level') | float(0.3) }}"
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ alexa_volume_temp_enabled }}"
                      sequence:
                        - service: media_player.volume_set
                          data:
                            entity_id: "{{ _player }}"
                            volume_level: "{{ alexa_volume_level }}"
                - service: notify.alexa_media
                  data:
                    message: "Die Pflanze ist zu trocken."
                    target:
                      - "{{ _player }}"
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ alexa_volume_temp_enabled }}"
                      sequence:
                        - delay:
                            seconds: "{{ alexa_volume_restore_delay }}"
                        - service: media_player.volume_set
                          data:
                            entity_id: "{{ _player }}"
                            volume_level: "{{ _prev_vol }}"

      # OK
      - conditions:
          - condition: trigger
            id: ok
        sequence:
          - service: notify.alexa_media
            data:
              message: "Die Bodenfeuchte ist wieder im grünen Bereich."
              target: !input alexa_targets